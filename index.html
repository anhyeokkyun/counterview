<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>WEB Timer v1.0</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: #1e1e1e;

            font-family: Arial, sans-serif;
            color: white;
        }

        .container {
            width: 360px;

            padding: 30px;

            border-radius: 20px;

            background: #2c2c2c;

            text-align: center;

            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 24px;
        }

        .time-inputs {
            display: flex;

            gap: 10px;

            margin-bottom: 24px;
        }

        .time-box {
            flex: 1;
        }

        .time-box label {
            display: block;

            margin-bottom: 8px;

            font-size: 14px;

            color: #cccccc;
        }

        .time-box input {
            width: 100%;

            padding: 12px;

            font-size: 20px;

            text-align: center;

            border: none;
            border-radius: 10px;

            background: #444;

            color: white;
        }

        .timer-display {
            font-size: 64px;

            font-weight: bold;

            margin-bottom: 28px;

            letter-spacing: 2px;
        }

        .buttons {
            display: flex;

            gap: 10px;
        }

        button {
            flex: 1;

            padding: 14px;

            border: none;
            border-radius: 12px;

            font-size: 16px;
            font-weight: bold;

            color: white;

            cursor: pointer;

            transition:
                transform 0.1s ease,
                opacity 0.2s ease,
                box-shadow 0.2s ease;
        }

        button:hover {
            opacity: 0.92;
        }

        button:active {
            transform: scale(0.95);
        }

        .start-btn {
            background: #4caf50;

            box-shadow:
                0 4px 12px rgba(76, 175, 80, 0.4);
        }

        .pause-btn {
            background: #ff9800;

            box-shadow:
                0 4px 12px rgba(255, 152, 0, 0.4);
        }

        .reset-btn {
            background: #f44336;

            box-shadow:
                0 4px 12px rgba(244, 67, 54, 0.4);
        }

        .finished {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>WEB Timer v1.0</h1>

        <div class="time-inputs">

            <div class="time-box">
                <label>시</label>

                <input
                    type="number"
                    id="hours"
                    min="0"
                    value="0">
            </div>

            <div class="time-box">
                <label>분</label>

                <input
                    type="number"
                    id="minutes"
                    min="0"
                    max="59"
                    value="0">
            </div>

            <div class="time-box">
                <label>초</label>

                <input
                    type="number"
                    id="seconds"
                    min="0"
                    max="59"
                    value="0">
            </div>

        </div>

        <div
            class="timer-display"
            id="timerDisplay">

            00:00:00

        </div>

        <div class="buttons">

            <button
                class="start-btn"
                onclick="startTimer()">

                Start

            </button>

            <button
                class="pause-btn"
                onclick="pauseTimer()">

                Pause

            </button>

            <button
                class="reset-btn"
                onclick="resetTimer()">

                Reset

            </button>

        </div>

    </div>

    <script>

        let timerId = null;

        let remainingTime = 0;

        const display =
            document.getElementById("timerDisplay");

        function formatTime(totalSeconds) {

            const hours =
                Math.floor(totalSeconds / 3600);

            const minutes =
                Math.floor((totalSeconds % 3600) / 60);

            const seconds =
                totalSeconds % 60;

            return (
                String(hours).padStart(2, "0") + ":" +
                String(minutes).padStart(2, "0") + ":" +
                String(seconds).padStart(2, "0")
            );
        }

        function updateDisplay() {

            display.textContent =
                formatTime(remainingTime);
        }

        function getInputSeconds() {

            const hours =
                parseInt(
                    document.getElementById("hours").value
                ) || 0;

            const minutes =
                parseInt(
                    document.getElementById("minutes").value
                ) || 0;

            const seconds =
                parseInt(
                    document.getElementById("seconds").value
                ) || 0;

            return (
                (hours * 3600) +
                (minutes * 60) +
                seconds
            );
        }

        function startTimer() {

            if (remainingTime === 0) {

                remainingTime =
                    getInputSeconds();

                if (remainingTime <= 0) {

                    alert("시간을 입력하세요.");

                    return;
                }

                updateDisplay();
            }

            if (timerId !== null) {
                return;
            }

            display.classList.remove("finished");

            timerId = setInterval(() => {

                remainingTime--;

                updateDisplay();

                if (remainingTime <= 0) {

                    clearInterval(timerId);

                    timerId = null;

                    remainingTime = 0;

                    updateDisplay();

                    display.classList.add("finished");

                    // 알람 먼저 재생
                    playAlarm();

                    // Safari 대응:
                    // 팝업을 약간 늦게 띄움
                    setTimeout(() => {

                        alert("시간이 종료되었습니다.");

                    }, 300);
                }

            }, 1000);
        }

        function pauseTimer() {

            clearInterval(timerId);

            timerId = null;
        }

        function resetTimer() {

            clearInterval(timerId);

            timerId = null;

            remainingTime = 0;

            display.textContent = "00:00:00";

            display.classList.remove("finished");
        }

        // Web Audio API 알람
        function playAlarm() {

            const audioContext =
                new (
                    window.AudioContext ||
                    window.webkitAudioContext
                )();

            // 5회 반복
            for (let i = 0; i < 5; i++) {

                const oscillator =
                    audioContext.createOscillator();

                const gainNode =
                    audioContext.createGain();

                oscillator.type = "sine";

                oscillator.frequency.setValueAtTime(
                    880,
                    audioContext.currentTime
                );

                oscillator.connect(gainNode);

                gainNode.connect(
                    audioContext.destination
                );

                // 반복 간격
                const startTime =
                    audioContext.currentTime +
                    (i * 0.1);

                gainNode.gain.setValueAtTime(
                    0.3,
                    startTime
                );

                gainNode.gain.exponentialRampToValueAtTime(
                    0.0001,
                    startTime + 0.5
                );

                oscillator.start(startTime);

                oscillator.stop(startTime + 0.5);
            }
        }

        updateDisplay();

    </script>

</body>

</html>
