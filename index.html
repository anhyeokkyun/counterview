<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>COUNTERVIEW</title>

    <style>

    * {
        box-sizing: border-box;
    }

    body {

        margin: 0;

        width: 100vw;

        height: 100dvh;

        overflow: hidden;

        display: flex;

        justify-content: center;

        align-items: center;

        background: #1e1e1e;

        font-family: Arial, sans-serif;

        color: white;
    }

    .container {

        width: min(96vw, 1800px);

        min-height: 100dvh;

        padding: 6px;

        border-radius: 16px;

        background: #2c2c2c;

        text-align: center;

        box-shadow: 0 0 30px rgba(0,0,0,0.5);

        display: flex;

        flex-direction: column;

        gap: 2px;

        overflow: hidden;
    }

    h1 {

        margin: 0;

        line-height: 1;

        font-size: clamp(14px, 1.2vw, 28px);
    }

    #roomTitle {

        font-size: clamp(18px, 1.8vw, 36px);

        font-weight: bold;

        color: #ffd54f;

        margin: 0;

        line-height: 1;
    }

    .room-title-input-wrap {

        flex-shrink: 0;

        margin: 0;
    }

    #roomTitleInput {

        width: 100%;

        padding: 6px;

        border: none;

        border-radius: 10px;

        background: #444;

        color: white;

        font-size: clamp(12px, 1vw, 18px);

        text-align: center;
    }

    .time-section {

        border: 2px solid #555;

        border-radius: 14px;

        padding: 6px;

        background: #3a3a3a;

        flex-shrink: 0;
    }

    .section-title {

        font-size: clamp(14px, 1.2vw, 24px);

        font-weight: bold;

        margin-bottom: 4px;

        color: #ffd54f;

        text-align: left;

        line-height: 1;
    }

    .time-inputs {

        display: flex;

        gap: 8px;
    }

    .time-box {

        flex: 1;
    }

    .time-box label {

        display: block;

        margin-bottom: 2px;

        font-size: clamp(10px, 0.8vw, 16px);

        color: #cccccc;
    }

    .time-box input {

        width: 100%;

        padding: 6px;

        font-size: clamp(14px, 1vw, 22px);

        text-align: center;

        border: none;

        border-radius: 10px;

        background: #444;

        color: white;
    }

    .timer-display {

        flex: 1 1 auto;

        min-height: 0;
        
        max-height: 48vh;

        display: flex;

        justify-content: center;

        align-items: center;

        overflow: hidden;

        font-size: min(16vw, 320px);

        font-weight: bold;

        letter-spacing: 1px;

        line-height: 0.9;

        margin: 0;

        padding: 0;
    }

    #midAlertMessage {

        height: 14px;

        display: flex;

        justify-content: center;

        align-items: center;

        font-size: 10px;

        font-weight: bold;

        color: #ffd54f;

        opacity: 0;

        transition: opacity 0.3s ease;

        flex-shrink: 0;

        margin: 0;
    }

    #midAlertMessage.show {

        opacity: 1;

        animation: blink 1s infinite;
    }

    .buttons {

        display: flex;

        gap: 6px;

        flex-shrink: 0;
        
        min-height: 40px;
    }

    button {

        flex: 1;

        padding: 6px;

        border: none;

        border-radius: 10px;

        font-size: clamp(12px, 0.9vw, 18px);

        font-weight: bold;

        color: white;

        cursor: pointer;
    }

    .start-btn {

        background: #4caf50;
    }

    .pause-btn {

        background: #ff9800;
    }

    .reset-btn {

        background: #f44336;
    }

    .share-box {

        display: flex;

        gap: 6px;

        flex-shrink: 0;
        
        min-height: 40px;
    }

    #viewerLink {

        flex: 1;

        padding: 6px;

        border: none;

        border-radius: 10px;

        background: #444;

        color: white;

        font-size: clamp(10px, 0.8vw, 16px);
    }

    #copyLinkBtn {

        padding: 6px 12px;

        border: none;

        border-radius: 10px;

        background: #2196f3;

        color: white;

        font-size: clamp(11px, 0.9vw, 18px);

        font-weight: bold;
    }

    .finished {

        animation: blink 1s infinite;
    }

    @keyframes blink {

        0% {
            opacity: 1;
        }

        50% {
            opacity: 0.3;
        }

        100% {
            opacity: 1;
        }
    }

    @media screen and (orientation: landscape) {

        .container {

            padding: 4px;

            gap: 3px;
        }

        h1 {

            font-size: 12px;

            margin: 0;
        }

        #roomTitle {

            font-size: 12px;

            margin: 0;
        }

        .room-title-input-wrap {

            margin: 0;
        }

        #roomTitleInput {

            padding: 3px;

            font-size: 10px;
        }

        .time-section {

            padding: 4px;
        }

        .section-title {

            font-size: 11px;

            margin-bottom: 2px;
        }

        .time-inputs {

            gap: 4px;
        }

        .time-box label {

            font-size: 9px;

            margin-bottom: 1px;
        }

        .time-box input {

            padding: 3px;

            font-size: 10px;
        }

        .timer-display {

            flex: 1 1 auto;

            min-height: 0;

            max-height: 42vh;

            display: flex;

            justify-content: center;

            align-items: center;

            overflow: hidden;

            font-size: min(10vw, 110px);

            font-weight: bold;

            letter-spacing: 1px;

            line-height: 0.9;

            margin: 0;

            padding: 0;
        }

        #midAlertMessage {

            height: 16px;

            font-size: 11px;
        }

        .buttons {

            gap: 4px;
        }

        button {

            padding: 4px;

            font-size: 10px;
        }

        .share-box {

            gap: 4px;
        }

        #viewerLink {

            padding: 4px;

            font-size: 10px;
        }

        #copyLinkBtn {

            padding: 4px 8px;

            font-size: 10px;
        }
    }

    @supports (-webkit-touch-callout: none) {

        body {

            min-height: -webkit-fill-available;
        }

        .container {

            min-height: -webkit-fill-available;
        }
    }

    </style>
</head>

<body>

    <div class="container">

        <h1>COUNTERVIEW</h1>

        <div id="roomTitle">
            Room Title
        </div>

        <div class="room-title-input-wrap">

            <input
                type="text"
                id="roomTitleInput"
                placeholder="페이지 제목 입력">

        </div>

        <!-- FINAL -->
        <div class="time-section">

            <div class="section-title">
                Final
            </div>

            <div class="time-inputs">

                <div class="time-box">

                    <label for="hours">
                        hours
                    </label>

                    <input
                        type="number"
                        id="hours"
                        min="0"
                        value="0">

                </div>

                <div class="time-box">

                    <label for="minutes">
                        minutes
                    </label>

                    <input
                        type="number"
                        id="minutes"
                        min="0"
                        max="59"
                        value="0">

                </div>

                <div class="time-box">

                    <label for="seconds">
                        seconds
                    </label>

                    <input
                        type="number"
                        id="seconds"
                        min="0"
                        max="59"
                        value="0">

                </div>

            </div>

        </div>

        <!-- SPLIT -->
        <div class="time-section">

            <div class="section-title">
                Split
            </div>

            <div class="time-inputs mid-alert-inputs">

                <div class="time-box">

                    <label for="alertHours">
                        hours
                    </label>

                    <input
                        type="number"
                        id="alertHours"
                        min="0"
                        value="0">

                </div>

                <div class="time-box">

                    <label for="alertMinutes">
                        minutes
                    </label>

                    <input
                        type="number"
                        id="alertMinutes"
                        min="0"
                        max="59"
                        value="0">

                </div>

                <div class="time-box">

                    <label for="alertSeconds">
                        seconds
                    </label>

                    <input
                        type="number"
                        id="alertSeconds"
                        min="0"
                        max="59"
                        value="0">

                </div>

            </div>

        </div>

        <div
            class="timer-display"
            id="timerDisplay">

            00:00:00

        </div>

        <div id="midAlertMessage"></div>

        <div class="buttons">

            <button
                class="start-btn"
                id="startBtn">

                Start

            </button>

            <button
                class="pause-btn"
                id="pauseBtn">

                Pause

            </button>

            <button
                class="reset-btn"
                id="resetBtn">

                Reset

            </button>

        </div>

        <div class="share-box">

            <input
                type="text"
                id="viewerLink"
                readonly>

            <button id="copyLinkBtn">
                Copy Link
            </button>

        </div>

    </div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getDatabase,
    ref,
    set,
    onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

    apiKey: "AIzaSyDUVCjFa49SraSoyktPlnjAVsJIPc35yZM",

    authDomain: "web-timer-rtbase.firebaseapp.com",

    databaseURL:
        "https://web-timer-rtbase-default-rtdb.asia-southeast1.firebasedatabase.app",

    projectId: "web-timer-rtbase",

    storageBucket:
        "web-timer-rtbase.firebasestorage.app",

    messagingSenderId: "528974092407",

    appId:
        "1:528974092407:web:2b8c0429a9426399cf8e72"
};

const app =
    initializeApp(firebaseConfig);

const db =
    getDatabase(app);

const params =
    new URLSearchParams(window.location.search);

const isViewer =
    params.get("viewer") === "1";

// room id
let roomId =
    params.get("room");

// room 없으면 자동 생성
if (!roomId) {

    roomId =
        Math.random()
            .toString(36)
            .substring(2, 8);

    // 호스트 URL 생성
    const newUrl =
        `${window.location.pathname}?room=${roomId}`;

    window.history.replaceState(
        {},
        "",
        newUrl
    );
}

let timerId = null;

let remainingTime = 0;

let midAlertTime = 0;

let midAlertTriggered = false;

let viewerMidAlertShown = false;

const display =
    document.getElementById("timerDisplay");

const viewerLinkInput =
    document.getElementById(
        "viewerLink"
    );

const copyLinkBtn =
    document.getElementById(
        "copyLinkBtn"
    );

// viewer url 생성
const viewerUrl =
    `${window.location.origin}` +
    `${window.location.pathname}` +
    `?viewer=1&room=${roomId}`;

viewerLinkInput.value =
    viewerUrl;

const roomTitle =
    document.getElementById("roomTitle");

const roomTitleInput =
    document.getElementById(
        "roomTitleInput"
    );

function formatTime(totalSeconds) {

    const hours =
        Math.floor(totalSeconds / 3600);

    const minutes =
        Math.floor((totalSeconds % 3600) / 60);

    const seconds =
        totalSeconds % 60;

    return (
        String(hours).padStart(2, "0") + ":" +
        String(minutes).padStart(2, "0") + ":" +
        String(seconds).padStart(2, "0")
    );
}

async function updateRoomTitle(title) {

    roomTitle.textContent = title;

    if (!isViewer) {

        await set(

            ref(
                db,
                `sharedTimer/${roomId}/roomTitle`
            ),

            {
                text: title
            }
        );
    }
}
    
async function updateDisplay() {

    const formatted =
        formatTime(remainingTime);

    display.textContent = formatted;

    // 호스트만 Firebase 업로드
    if (!isViewer) {

       await set(

           ref(
               db,
               `sharedTimer/${roomId}/current`
           ),

           {
               time: formatted,

               midAlert:
                   midAlertTriggered
           }
       );
    }
}

function getInputSeconds() {

    const hours =
        parseInt(
            document.getElementById("hours").value
        ) || 0;

    const minutes =
        parseInt(
            document.getElementById("minutes").value
        ) || 0;

    const seconds =
        parseInt(
            document.getElementById("seconds").value
        ) || 0;

    return (
        (hours * 3600) +
        (minutes * 60) +
        seconds
    );
}

function getMidAlertSeconds() {

    const hours =
        parseInt(
            document.getElementById("alertHours").value
        ) || 0;

    const minutes =
        parseInt(
            document.getElementById("alertMinutes").value
        ) || 0;

    const seconds =
        parseInt(
            document.getElementById("alertSeconds").value
        ) || 0;

    return (
        (hours * 3600) +
        (minutes * 60) +
        seconds
    );
}

async function startTimer() {

    if (remainingTime === 0) {

        remainingTime =
            getInputSeconds();

        midAlertTime =
            getMidAlertSeconds();

        midAlertTriggered = false;

        if (remainingTime <= 0) {

            alert("시간을 입력하세요.");

            return;
        }

        await updateDisplay();
    }

    if (timerId !== null) {
        return;
    }

    display.classList.remove("finished");

    timerId = setInterval(async () => {

        remainingTime--;

        // 중간 알림
        if (
            !midAlertTriggered &&
            midAlertTime > 0 &&
            remainingTime === midAlertTime
        ) {

            midAlertTriggered = true;

            playMidAlarm();

            const message =
                document.getElementById(
                    "midAlertMessage"
                );

            message.textContent =
                "중간 알림 시간이 지났습니다.";

            message.classList.add("show");

            // 5초 후 자동 제거
            setTimeout(() => {

                message.classList.remove("show");

                message.textContent = "";

            }, 5000);
        }

        await updateDisplay();

        if (remainingTime <= 0) {

            clearInterval(timerId);

            timerId = null;

            remainingTime = 0;

            await updateDisplay();

            display.classList.add("finished");

            playFinalAlarm();

            setTimeout(() => {

                alert("시간이 종료되었습니다.");

            }, 1000);
        }

    }, 1000);
}

function pauseTimer() {

    clearInterval(timerId);

    timerId = null;
}

async function resetTimer() {

    clearInterval(timerId);

    timerId = null;

    remainingTime = 0;

    midAlertTime = 0;

    midAlertTriggered = false;

    display.textContent = "00:00:00";

    display.classList.remove("finished");

    await set(

        ref(
            db,
            `sharedTimer/${roomId}/current`
        ),

        {
            time: "00:00:00"
        }
    );
}

// Web Audio API 알람
let audioContext = null;

// 중간 알림
function playMidAlarm() {

    if (!audioContext) {

        audioContext =
            new (
                window.AudioContext ||
                window.webkitAudioContext
            )();
    }

    // 2회
    for (let i = 0; i < 2; i++) {

        const oscillator =
            audioContext.createOscillator();

        const gainNode =
            audioContext.createGain();

        oscillator.type = "sine";

        oscillator.frequency.setValueAtTime(
            700,
            audioContext.currentTime
        );

        oscillator.connect(gainNode);

        gainNode.connect(
            audioContext.destination
        );

        // 0.25초 간격
        const startTime =
            audioContext.currentTime +
            (i * 0.25);

        gainNode.gain.setValueAtTime(
            0.25,
            startTime
        );

        gainNode.gain.exponentialRampToValueAtTime(
            0.0001,
            startTime + 0.25
        );

        oscillator.start(startTime);

        oscillator.stop(startTime + 0.25);
    }
}

// 최종 종료 알림
function playFinalAlarm() {

    if (!audioContext) {

        audioContext =
            new (
                window.AudioContext ||
                window.webkitAudioContext
            )();
    }

    // 5회
    for (let i = 0; i < 5; i++) {

        const oscillator =
            audioContext.createOscillator();

        const gainNode =
            audioContext.createGain();

        oscillator.type = "sine";

        oscillator.frequency.setValueAtTime(
            880,
            audioContext.currentTime
        );

        oscillator.connect(gainNode);

        gainNode.connect(
            audioContext.destination
        );

        // 0.1초 간격
        const startTime =
            audioContext.currentTime +
            (i * 0.1);

        gainNode.gain.setValueAtTime(
            0.3,
            startTime
        );

        gainNode.gain.exponentialRampToValueAtTime(
            0.0001,
            startTime + 0.5
        );

        oscillator.start(startTime);

        oscillator.stop(startTime + 0.5);
    }
}

// 버튼 이벤트 연결
document
    .getElementById("startBtn")
    .addEventListener("click", startTimer);

document
    .getElementById("pauseBtn")
    .addEventListener("click", pauseTimer);

document
    .getElementById("resetBtn")
    .addEventListener("click", resetTimer);

copyLinkBtn.addEventListener(

    "click",

    async () => {

        await navigator.clipboard
            .writeText(viewerUrl);

        copyLinkBtn.textContent =
            "복사 완료!";

        setTimeout(() => {

            copyLinkBtn.textContent =
                "링크 복사";

        }, 1500);
    }
);

roomTitleInput.addEventListener(

    "input",

    async (event) => {

        await updateRoomTitle(
            event.target.value
        );
    }
);

// 초기 화면
updateDisplay();

onValue(

    ref(
        db,
        `sharedTimer/${roomId}/roomTitle`
    ),

    (snapshot) => {

        const data =
            snapshot.val();

        if (
            data &&
            data.text
        ) {

            roomTitle.textContent =
                data.text;
        }
    }
);

// 시청자 모드
if (isViewer) {
    
    document
    .querySelector(".share-box")
    .style.display = "none";

    document.querySelector(".buttons")
        .style.display = "none";

    document
    .querySelector(
        ".room-title-input-wrap"
    )
    .style.display = "none";

    document
        .querySelectorAll(".time-section")
        .forEach((element) => {

            element.style.display = "none";
    });

    onValue(

        ref(
            db,
            `sharedTimer/${roomId}/current`
        ),

        (snapshot) => {

            const data =
                snapshot.val();

            if (data && data.time) {

                display.textContent =
                    data.time;

                // 중간 알림 표시
                if (data.midAlert) {

                    const message =
                        document.getElementById(
                            "midAlertMessage"
                        );

                    message.textContent =
                        "중간 알림 시간이 지났습니다.";

                    message.classList.add("show");

                    setTimeout(() => {

                        message.classList.remove("show");

                        message.textContent = "";

                    }, 5000);
                }


                // 다음 알림 대비 초기화
                if (!data.midAlert) {

                    viewerMidAlertShown = false;
                }
            }
        }
    );
}

</script>

</body>

</html>
