<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>WEB Timer v1.0</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: #1e1e1e;

            font-family: Arial, sans-serif;
            color: white;
        }

        .container {

            width: 90vw;
            max-width: 1200px;

            height: 90vh;

            padding: 40px;

            border-radius: 24px;

            background: #2c2c2c;

            text-align: center;

            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);

            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 24px;
        }

        .time-inputs {

            display: flex;

            gap: 10px;

            margin-bottom: 10px;
        }

        .time-box {
            flex: 1;
        }

        .time-box label {
            display: block;

            margin-bottom: 8px;

            font-size: 14px;

            color: #cccccc;
        }

        .time-box input {
            width: 100%;

            padding: 12px;

            font-size: 20px;

            text-align: center;

            border: none;
            border-radius: 10px;

            background: #444;

            color: white;
        }

        .timer-display {

            flex: 1;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 12vw;

            font-weight: bold;

            letter-spacing: 8px;

            margin: 20px 0;
        }

        .buttons {
            display: flex;

            gap: 10px;
        }

        button {
            flex: 1;

            padding: 10px;

            border: none;
            border-radius: 12px;

            font-size: 14px;
            font-weight: bold;

            color: white;

            cursor: pointer;

            transition:
                transform 0.1s ease,
                opacity 0.2s ease,
                box-shadow 0.2s ease;
        }

        button:hover {
            opacity: 0.92;
        }

        button:active {
            transform: scale(0.95);
        }

        .start-btn {
            background: #4caf50;

            box-shadow:
                0 4px 12px rgba(76, 175, 80, 0.4);
        }

        .pause-btn {
            background: #ff9800;

            box-shadow:
                0 4px 12px rgba(255, 152, 0, 0.4);
        }

        .reset-btn {
            background: #f44336;

            box-shadow:
                0 4px 12px rgba(244, 67, 54, 0.4);
        }

        .finished {
            animation: blink 1s infinite;
        }

        #midAlertMessage {

            height: 40px;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 28px;
            font-weight: bold;

            color: #ffd54f;

            opacity: 0;

            transition: opacity 0.3s ease;
        }

        #midAlertMessage.show {

    opacity: 1;

    animation: blink 1s infinite;
}

        @keyframes blink {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>WEB Timer v1.0</h1>

        <div class="time-inputs">

            <div class="time-box">

                <label for="hours">시</label>

                <input
                    type="number"
                    id="hours"
                    min="0"
                    value="0">

            </div>

            <div class="time-box">

                <label for="minutes">분</label>

                <input
                    type="number"
                    id="minutes"
                    min="0"
                    max="59"
                    value="0">

            </div>

            <div class="time-box">

                <label for="seconds">초</label>

                <input
                    type="number"
                    id="seconds"
                    min="0"
                    max="59"
                    value="0">

            </div>

        </div>

        <div class="time-inputs mid-alert-inputs">

            <div class="time-box">

                <label for="alertHours">
                    중간알림 시
                </label>

                <input
                    type="number"
                    id="alertHours"
                    min="0"
                    value="0">

            </div>

            <div class="time-box">

                <label for="alertMinutes">
                    중간알림 분
                </label>

                <input
                    type="number"
                    id="alertMinutes"
                    min="0"
                    max="59"
                    value="0">

            </div>

            <div class="time-box">

                <label for="alertSeconds">
                    중간알림 초
                </label>

                <input
                    type="number"
                    id="alertSeconds"
                    min="0"
                    max="59"
                    value="0">

            </div>

        </div>

        <div
            class="timer-display"
            id="timerDisplay">

            00:00:00

        </div>

        <div id="midAlertMessage"></div>

        <div class="buttons">

            <button
                class="start-btn"
                id="startBtn">

                Start

            </button>

            <button
                class="pause-btn"
                id="pauseBtn">

                Pause

            </button>

            <button
                class="reset-btn"
                id="resetBtn">

                Reset

            </button>

        </div>

    </div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getDatabase,
    ref,
    set,
    onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

    apiKey: "AIzaSyDUVCjFa49SraSoyktPlnjAVsJIPc35yZM",

    authDomain: "web-timer-rtbase.firebaseapp.com",

    databaseURL:
        "https://web-timer-rtbase-default-rtdb.asia-southeast1.firebasedatabase.app",

    projectId: "web-timer-rtbase",

    storageBucket:
        "web-timer-rtbase.firebasestorage.app",

    messagingSenderId: "528974092407",

    appId:
        "1:528974092407:web:2b8c0429a9426399cf8e72"
};

const app =
    initializeApp(firebaseConfig);

const db =
    getDatabase(app);

const params =
    new URLSearchParams(window.location.search);

const isViewer =
    params.get("viewer") === "1";

let timerId = null;

let remainingTime = 0;

let midAlertTime = 0;

let midAlertTriggered = false;

let viewerMidAlertShown = false;

const display =
    document.getElementById("timerDisplay");

function formatTime(totalSeconds) {

    const hours =
        Math.floor(totalSeconds / 3600);

    const minutes =
        Math.floor((totalSeconds % 3600) / 60);

    const seconds =
        totalSeconds % 60;

    return (
        String(hours).padStart(2, "0") + ":" +
        String(minutes).padStart(2, "0") + ":" +
        String(seconds).padStart(2, "0")
    );
}

async function updateDisplay() {

    const formatted =
        formatTime(remainingTime);

    display.textContent = formatted;

    // 호스트만 Firebase 업로드
    if (!isViewer) {

       await set(

           ref(
               db,
               "sharedTimer/current"
           ),

           {
               time: formatted,

               midAlert:
                   midAlertTriggered
           }
       );
    }
}

function getInputSeconds() {

    const hours =
        parseInt(
            document.getElementById("hours").value
        ) || 0;

    const minutes =
        parseInt(
            document.getElementById("minutes").value
        ) || 0;

    const seconds =
        parseInt(
            document.getElementById("seconds").value
        ) || 0;

    return (
        (hours * 3600) +
        (minutes * 60) +
        seconds
    );
}

function getMidAlertSeconds() {

    const hours =
        parseInt(
            document.getElementById("alertHours").value
        ) || 0;

    const minutes =
        parseInt(
            document.getElementById("alertMinutes").value
        ) || 0;

    const seconds =
        parseInt(
            document.getElementById("alertSeconds").value
        ) || 0;

    return (
        (hours * 3600) +
        (minutes * 60) +
        seconds
    );
}

async function startTimer() {

    if (remainingTime === 0) {

        remainingTime =
            getInputSeconds();

        midAlertTime =
            getMidAlertSeconds();

        midAlertTriggered = false;

        if (remainingTime <= 0) {

            alert("시간을 입력하세요.");

            return;
        }

        await updateDisplay();
    }

    if (timerId !== null) {
        return;
    }

    display.classList.remove("finished");

    timerId = setInterval(async () => {

        remainingTime--;

        // 중간 알림
        if (
            !midAlertTriggered &&
            midAlertTime > 0 &&
            remainingTime === midAlertTime
        ) {

            midAlertTriggered = true;

            playAlarm();

            const message =
                document.getElementById(
                    "midAlertMessage"
                );

            message.textContent =
                "중간 알림 시간이 지났습니다.";

            message.classList.add("show");

            // 5초 후 자동 제거
            setTimeout(() => {

                message.classList.remove("show");

                message.textContent = "";

            }, 5000);
        }

        await updateDisplay();

        if (remainingTime <= 0) {

            clearInterval(timerId);

            timerId = null;

            remainingTime = 0;

            await updateDisplay();

            display.classList.add("finished");

            playAlarm();

            setTimeout(() => {

                alert("시간이 종료되었습니다.");

            }, 1000);
        }

    }, 1000);
}

function pauseTimer() {

    clearInterval(timerId);

    timerId = null;
}

async function resetTimer() {

    clearInterval(timerId);

    timerId = null;

    remainingTime = 0;

    midAlertTime = 0;

    midAlertTriggered = false;

    display.textContent = "00:00:00";

    display.classList.remove("finished");

    await set(

        ref(
            db,
            "sharedTimer/current"
        ),

        {
            time: "00:00:00"
        }
    );
}

const audioContext =
    new (
        window.AudioContext ||
        window.webkitAudioContext
    )();

// Web Audio API 알람
function playAlarm() {

    for (let i = 0; i < 5; i++) {

        const oscillator =
            audioContext.createOscillator();

        const gainNode =
            audioContext.createGain();

        oscillator.type = "sine";

        oscillator.frequency.setValueAtTime(
            880,
            audioContext.currentTime
        );

        oscillator.connect(gainNode);

        gainNode.connect(
            audioContext.destination
        );

        const startTime =
            audioContext.currentTime +
            (i * 0.1);

        gainNode.gain.setValueAtTime(
            0.3,
            startTime
        );

        gainNode.gain.exponentialRampToValueAtTime(
            0.0001,
            startTime + 0.5
        );

        oscillator.start(startTime);

        oscillator.stop(startTime + 0.5);
    }
}

// 버튼 이벤트 연결
document
    .getElementById("startBtn")
    .addEventListener("click", startTimer);

document
    .getElementById("pauseBtn")
    .addEventListener("click", pauseTimer);

document
    .getElementById("resetBtn")
    .addEventListener("click", resetTimer);

// 초기 화면
updateDisplay();

// 시청자 모드
if (isViewer) {

    document.querySelector(".buttons")
        .style.display = "none";

    document
        .querySelectorAll(".time-inputs")
        .forEach((element) => {

            element.style.display = "none";
        });

    onValue(

        ref(
            db,
            "sharedTimer/current"
        ),

        (snapshot) => {

            const data =
                snapshot.val();

            if (data && data.time) {

                display.textContent =
                    data.time;

                // 중간 알림 표시
                if (data.midAlert) {

                    const message =
                        document.getElementById(
                            "midAlertMessage"
                        );

                    message.textContent =
                        "중간 알림 시간이 지났습니다.";

                    message.classList.add("show");

                    setTimeout(() => {

                        message.classList.remove("show");

                        message.textContent = "";

                    }, 5000);
                }


                // 다음 알림 대비 초기화
                if (!data.midAlert) {

                    viewerMidAlertShown = false;
                }
            }
        }
    );
}

</script>

</body>

</html>
